name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [18, 20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Install dependencies
        run: npm ci

      - name: Build generated artifacts
        run: npm run build

      - name: Run tests
        run: npm test

      - name: Verify zero runtime dependencies
        run: |
          node -e "const pkg = require('./package.json'); const runtime = ['dependencies','optionalDependencies','bundleDependencies'].flatMap((key) => Object.keys(pkg[key] || {})); if (runtime.length) { console.error('ERROR: runtime dependencies must stay empty:', runtime.join(', ')); process.exit(1); }"

      - name: Verify generated artifacts are committed
        run: git diff --exit-code -- bin test

      - name: Verify SKILL.md contains all 7 laws
        run: |
          for law in "Law 1" "Law 2" "Law 3" "Law 4" "Law 5" "Law 6" "Law 7"; do
            if ! grep -q "$law" SKILL.md; then
              echo "ERROR: SKILL.md missing $law"
              exit 1
            fi
          done

      - name: Verify skill-mirror parity (plugin copy == standalone copy)
        run: npm run verify:skill-mirror

      - name: Verify docs-substring assertions match their target files
        run: npm run verify:docs-substrings

      - name: Verify instinct packs are valid JSON
        run: |
          for pack in instinct-packs/*.json; do
            node -e "JSON.parse(require('fs').readFileSync('$pack','utf8'))" || exit 1
            echo "✓ $pack is valid JSON"
          done

  lint-transcript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build generated artifacts
        run: npm run build

      - name: Verify transcript linter works
        run: |
          echo '{"tool":"Bash","event":"tool_start"}' | node bin/lint-transcript.mjs --stdin || true
          echo "✓ Transcript linter runs without errors"
