name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # registry-url is required for OIDC trusted publishing (it's in npm's
      # documented example): it points npm at registry.npmjs.org for the OIDC
      # token exchange. On Node >= 22.14 + npm >= 11.5.1 with a configured
      # trusted publisher, npm mints and uses the OIDC token, overriding the
      # placeholder _authToken setup-node writes. Do NOT add a NODE_AUTH_TOKEN
      # env to the publish step — that reintroduced a real (dummy) token and
      # caused E404 on Node 20.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # Trusted publishing (OIDC) requires npm >= 11.5.1 AND Node >= 22.14.0.
      # Node 22 ships npm 10.x, so install the npm 11.18.0 publisher proven by
      # the successful v3.20.0 release. Do not track the mutable latest tag here.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@11.18.0

      - name: Install dependencies
        run: npm ci

      - name: Build generated artifacts
        run: npm run build

      - name: Verify generated artifacts are committed
        run: git diff --exit-code -- .claude-plugin bin hooks test lib plugins

      - name: Run verify:all
        run: npm run verify:all

      - name: Run tests
        run: node --test test/*.test.mjs

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            echo "Bump package.json on a release PR before tagging."
            exit 1
          fi
          echo "✓ tag v$TAG_VERSION matches package.json $PKG_VERSION"

      # Publishes via OIDC trusted publishing — no NPM_TOKEN secret.
      # Prerequisite: a trusted publisher must be configured on npmjs.com for this
      # repo + workflow file (see docs/RELEASING.md). Provenance attestations are
      # generated automatically from the OIDC claims.
      #
      # Publish with the pinned npm installed by the explicit global upgrade above.
      # Do not launch a second npm through npx: npm 12's temporary npx install
      # omitted the sigstore module and stopped v3.20.3 before registry contact.
      # The version echo proves which global npm executable runs the publish.
      - name: Publish to npm
        run: |
          echo "node $(node -v) / global npm $(npm -v)"
          npm publish --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag

      - name: Update major version tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MAJOR="v${TAG_VERSION%%.*}"
          echo "Updating major version tag $MAJOR -> $GITHUB_REF_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "$MAJOR -> $GITHUB_REF_NAME"
          git push origin "$MAJOR" --force
          echo "✓ Major version tag $MAJOR updated"
