name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Do NOT set registry-url here: setup-node would write an .npmrc with
      # `_authToken=${NODE_AUTH_TOKEN}` and a dummy placeholder token, which npm
      # uses for the publish PUT instead of OIDC — causing E404. OIDC trusted
      # publishing needs no token-bearing .npmrc. (Fix for the v3.12.0 publish.)
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # Trusted publishing (OIDC) requires npm >= 11.5.1; Node 20 ships npm 10.x.
      - name: Upgrade npm for trusted publishing
        run: npm install -g npm@latest

      - name: Install dependencies
        run: npm ci

      - name: Build generated artifacts
        run: npm run build

      - name: Verify generated artifacts are committed
        run: git diff --exit-code -- .claude-plugin bin hooks test lib plugins

      - name: Run verify:all
        run: npm run verify:all

      - name: Run tests
        run: node --test test/*.test.mjs

      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "ERROR: tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            echo "Bump package.json on a release PR before tagging."
            exit 1
          fi
          echo "✓ tag v$TAG_VERSION matches package.json $PKG_VERSION"

      # Publishes via OIDC trusted publishing — no NPM_TOKEN secret.
      # Prerequisite: a trusted publisher must be configured on npmjs.com for this
      # repo + workflow file (see docs/RELEASING.md). Provenance attestations are
      # generated automatically from the OIDC claims.
      - name: Publish to npm
        run: npm publish --access public --provenance

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" --generate-notes --verify-tag

      - name: Update major version tag
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG_VERSION="${GITHUB_REF#refs/tags/v}"
          MAJOR="v${TAG_VERSION%%.*}"
          echo "Updating major version tag $MAJOR -> $GITHUB_REF_NAME"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -fa "$MAJOR" -m "$MAJOR -> $GITHUB_REF_NAME"
          git push origin "$MAJOR" --force
          echo "✓ Major version tag $MAJOR updated"
